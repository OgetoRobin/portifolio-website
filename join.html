
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join me Today</title>
    <link rel="stylesheet" href="ternant.css">
    
</head>
<body>

<div class="login-container">
    <div class="logo">
        

<img src="logo.png" alt="">
</div>
    <h2>Visitors Details Form</h2>
<form id="joinform">
<label>Full Name</label>
<input type="text" id="name" placeholder="📧 eg ,Robin Ogeto">

<label>Email Address</label>
<input type="email" id="email" placeholder="📧 example@email.com">

<label>Phone Number</label>
<input type="tel" id="phonenumber" placeholder="🆔 Phone Number">

<label>About You</label>
<input type="text" id="message" placeholder="eg Student,">


<button type="submit" class="btn"> Submit to Explore</button>
<p id="error"></p>



</form>
<div id="loader">
            <div class="loaderbox">
                <h4>Please Wait</h4>
            <p>Processing your registration...</p>
            <div class="progressbar">
            <div class="progress"></div>
            </div>
        </div>
</div>
   
        <footer>
    <p>© 2026 || Developed by Robin@Ogeto </p>
    
</footer>

    
</div>
<!-- SUCCESS POPUP -->
<div class="success-popup" id="successPopup">
    <div class="success-box">
        <div class="checkmark">
            <svg viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="25" fill="none"/>
                <path fill="none" d="M14 27l7 7 17-17"/>
            </svg>
        </div>
        <h3>Welcome! </h3>
        <p id="successMessage"></p>
         
        <button onclick="closeSuccess()">Continue</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
  (function(){
    emailjs.init("HBMtkKt04bQhSvNZM"); // from EmailJS dashboard
  })();
    </script>
<script src="join2.js"></script>
</body>
</html>
